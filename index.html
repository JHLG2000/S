<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Pro</title>
</head>
<style>
<body> {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.calculadora {
    background: #ffffff;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    width: 300px;
}

#pantalla {
    width: 100%;
    height: 60px;
    font-size: 24px;
    text-align: right;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: none;
    background: #f2f2f2;
}

.botones {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

button {
    padding: 15px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

.numero {
    background: #e0e0e0;
}

.operador {
    background: #ff9500;
    color: white;
}

.igual {
    background: #28a745;
    color: white;
    grid-column: span 2;
}

.borrar {
    background: #dc3545;
    color: white;
}
</style>
</head>

<body>

<div class="calculadora">
    <input type="text" id="pantalla" disabled>

    <div class="botones">
        <button class="borrar" onclick="limpiar()">C</button>
        <button class="operador" onclick="agregar('/')">/</button>
        <button class="operador" onclick="agregar('*')">*</button>
        <button class="operador" onclick="agregar('-')">-</button>

        <button class="numero" onclick="agregar('7')">7</button>
        <button class="numero" onclick="agregar('8')">8</button>
        <button class="numero" onclick="agregar('9')">9</button>
        <button class="operador" onclick="agregar('+')">+</button>

        <button class="numero" onclick="agregar('4')">4</button>
        <button class="numero" onclick="agregar('5')">5</button>
        <button class="numero" onclick="agregar('6')">6</button>

        <button class="numero" onclick="agregar('1')">1</button>
        <button class="numero" onclick="agregar('2')">2</button>
        <button class="numero" onclick="agregar('3')">3</button>

        <button class="numero" onclick="agregar('0')">0</button>
        <button class="numero" onclick="agregar('.')">.</button>
        <button class="igual" onclick="calcular()">=</button>
    </div>
</div>

<script>
function agregar(valor) {
    document.getElementById("pantalla").value += valor;
}

function limpiar() {
    document.getElementById("pantalla").value = "";
}

function calcular() {
    try {
        document.getElementById("pantalla").value =
            eval(document.getElementById("pantalla").value);
    } catch {
        alert("Error en la operación");
    }
}
</script>

Activar Modo Premium ($20 MXN)
</button>
</body>

</html>
